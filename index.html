<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Behavior Tracker</title>
<!-- Google Fonts for a modern font -->
<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet" />
<style>
  body {
    font-family: 'Open Sans', sans-serif;
    background-color: #f0f2f5;
    margin: 0;
    padding: 30px;
    color: #333;
  }
  h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 30px;
    font-size: 2.5em;
  }
  .card {
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    padding: 20px;
    margin-bottom: 25px;
  }
  h2 {
    margin-top: 0;
    color: #34495e;
    font-size: 1.75em;
    margin-bottom: 15px;
  }
  label {
    display: inline-block;
    margin-top: 10px;
    margin-bottom: 5px;
    font-weight: 600;
  }
  input[type="text"],
  input[type="date"],
  select {
    width: calc(100% - 20px);
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: 'Open Sans', sans-serif;
  }
  button {
    background-color: #2980b9;
    color: #fff;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    margin-top: 10px;
    cursor: pointer;
    font-family: 'Open Sans', sans-serif;
    font-weight: 600;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: #3498db;
  }
  .button-group {
    margin-top: 15px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 12px 15px;
  }
  th {
    background-color: #ecf0f1;
    text-align: left;
  }
  #report {
    background-color: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    white-space: pre-wrap;
    margin-top: 15px;
    max-height: 400px;
    overflow-y: auto;
  }
  /* Responsive adjustments */
  @media(max-width: 768px){
    body {
      padding: 15px;
    }
  }
</style>
</head>
<body>

<h1>Student Behavior Tracker</h1>

<!-- Add Student -->
<div class="card" id="add-student-section">
  <h2>Add Student</h2>
  <label for="student-name">Student Name</label>
  <input type="text" id="student-name" placeholder="Enter student name" />
  <div class="button-group">
    <button onclick="addStudent()">Add Student</button>
  </div>
</div>

<!-- Add Class -->
<div class="card" id="add-class-section">
  <h2>Add Class</h2>
  <label for="class-name">Class Name</label>
  <input type="text" id="class-name" placeholder="Enter class name" />
  <div class="button-group">
    <button onclick="addClass()">Add Class</button>
  </div>
</div>

<!-- Record Behavior -->
<div class="card" id="record-behavior-section">
  <h2>Record Behavior</h2>
  <label for="student-select">Select Student</label>
  <select id="student-select"></select>
  <label for="class-select">Select Class</label>
  <select id="class-select"></select>
  <label for="behavior-type">Behavior Type</label>
  <select id="behavior-type">
    <option value="Good">Good</option>
    <option value="Bad">Bad</option>
  </select>
  <div class="button-group">
    <button onclick="recordBehavior()">Record Behavior</button>
  </div>
</div>

<!-- Generate Report -->
<div class="card" id="report-section">
  <h2>Generate Report</h2>
  <div class="button-group">
    <button onclick="generateReport('day')">Today</button>
    <button onclick="generateReport('week')">This Week</button>
    <button onclick="showCustomRange()">Custom Period</button>
  </div>
  <div id="custom-date-range" style="display:none; margin-top:10px;">
    <label for="start-date">Start Date</label>
    <input type="date" id="start-date" />
    <label for="end-date">End Date</label>
    <input type="date" id="end-date" />
    <button onclick="generateReport('custom')">Generate</button>
  </div>
  <div id="report"></div>
</div>

<script>
  // Data storage
  let students = JSON.parse(localStorage.getItem('students')) || [];
  let classes = JSON.parse(localStorage.getItem('classes')) || [];
  let behaviors = JSON.parse(localStorage.getItem('behaviors')) || [];

  // Save data function
  function saveData() {
    localStorage.setItem('students', JSON.stringify(students));
    localStorage.setItem('classes', JSON.stringify(classes));
    localStorage.setItem('behaviors', JSON.stringify(behaviors));
  }

  // Refresh dropdowns
  function refreshStudentSelect() {
    const select = document.getElementById('student-select');
    select.innerHTML = '';
    students.forEach(s => {
      const option = document.createElement('option');
      option.value = s.id;
      option.textContent = s.name;
      select.appendChild(option);
    });
  }

  function refreshClassSelect() {
    const select = document.getElementById('class-select');
    select.innerHTML = '';
    classes.forEach(c => {
      const option = document.createElement('option');
      option.value = c.id;
      option.textContent = c.name;
      select.appendChild(option);
    });
  }

  // Add student
  function addStudent() {
    const name = document.getElementById('student-name').value.trim();
    if (!name) return alert('Please enter a student name.');
    const id = Date.now().toString();
    students.push({ id, name, classIds: [] });
    saveData();
    refreshStudentSelect();
    document.getElementById('student-name').value = '';
  }

  // Add class
  function addClass() {
    const name = document.getElementById('class-name').value.trim();
    if (!name) return alert('Please enter a class name.');
    const id = Date.now().toString();
    classes.push({ id, name });
    saveData();
    refreshClassSelect();
    document.getElementById('class-name').value = '';
  }

  // Record behavior
  function recordBehavior() {
    const studentId = document.getElementById('student-select').value;
    const classId = document.getElementById('class-select').value;
    const behaviorType = document.getElementById('behavior-type').value;
    if (!studentId || !classId) return alert('Please select student and class.');
    const timestamp = new Date().toISOString();
    behaviors.push({ studentId, classId, behaviorType, timestamp });
    saveData();
    alert('Behavior recorded successfully.');
  }

  // Generate report
  function generateReport(period) {
    let startDate, endDate;
    if (period === 'day') {
      const today = new Date();
      startDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      endDate = new Date(startDate);
      endDate.setDate(endDate.getDate() + 1);
    } else if (period === 'week') {
      const today = new Date();
      const firstDay = today.getDate() - today.getDay();
      startDate = new Date(today.getFullYear(), today.getMonth(), firstDay);
      endDate = new Date(startDate);
      endDate.setDate(endDate.getDate() + 7);
    } else if (period === 'custom') {
      const s = document.getElementById('start-date').value;
      const e = document.getElementById('end-date').value;
      if (!s || !e) return alert('Please select start and end dates.');
      startDate = new Date(s);
      endDate = new Date(e);
      endDate.setDate(endDate.getDate() + 1);
    } else {
      return;
    }

    const reportBehaviors = behaviors.filter(b => {
      const t = new Date(b.timestamp);
      return t >= startDate && t < endDate;
    });

    let reportText = `📅 Report: ${startDate.toLocaleString()} - ${endDate.toLocaleString()}\n\n`;

    students.forEach(student => {
      const studentBehaviors = reportBehaviors.filter(b => b.studentId === student.id);
      const goodCount = studentBehaviors.filter(b => b.behaviorType === 'Good').length;
      const badCount = studentBehaviors.filter(b => b.behaviorType === 'Bad').length;
      reportText += `👤 ${student.name}\n`;
      reportText += `✅ Good: ${goodCount}\n`;
      reportText += `❌ Bad: ${badCount}\n\n`;
    });
    document.getElementById('report').textContent = reportText;
  }

  function showCustomRange() {
    document.getElementById('custom-date-range').style.display = 'block';
  }

  // Initialize dropdowns
  refreshStudentSelect();
  refreshClassSelect();
</script>

</body>
</html>
